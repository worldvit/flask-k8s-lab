# 1. 그라파나(Grafana) 설정
grafana:
  adminPassword: "admin" # 실습용 초기 비밀번호
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    hosts:
      - grafana.homelab.io # 접속 도메인 설정
  persistence:
    enabled: true
    storageClassName: "nfs-client" # 대시보드 설정 보존용 NFS 연동
    accessModes:
      - ReadWriteOnce
    size: 5Gi

# 2. 프로메테우스(Prometheus) 설정
prometheus:
  prometheusSpec:
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: "nfs-client" # 시계열 메트릭 데이터 보존용 NFS 연동
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
# monitoring-values.yaml 에 추가될 내용
alertmanager:
  config:
    global:
      slack_api_url_file: '/etc/alertmanager/secrets/slack-webhook-url/webhook-url' # Secret 파일 마운트 경로
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 1h
      receiver: 'slack-notifications'
    receivers:
      - name: 'slack-notifications'
        slack_configs:
          - channel: '#k8s-alerts' # 학생들의 실습 채널명
            send_resolved: true
            title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
            text: >-
              *Description:* {{ .CommonAnnotations.description }}
              *Details:*
              {{ range .Alerts }}
                - {{ .Labels.instance }}: {{ .Annotations.summary }}
              {{ end }}
  alertmanagerSpec:
    secrets:
      - slack-webhook-url # 1번에서 생성한 Secret 이름 마운트

serverFiles:
  alerts:
    groups:
      - name: NodeAndPodAlerts
        rules:
          # 시나리오 A: 노드 CPU/Memory 80% 초과 (지연 시간 1분)
          - alert: HighNodeCPUUsage
            expr: (100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100)) > 80
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Node {{ $labels.instance }} High CPU usage"
              description: "노드 CPU 사용률이 1분 이상 80%를 초과했습니다."
          
          # 시나리오 B: 파드 장애 상태 (지연 시간 1분)
          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total[5m]) > 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} is CrashLooping"
              description: "특정 파드가 1분 이상 정상적으로 기동되지 않고 재시작되고 있습니다."
